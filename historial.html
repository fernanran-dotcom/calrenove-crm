<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Calrenove - Historial</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <img src="img/logo-calrenove.png" alt="" onerror="this.style.display='none'"> Calrenove
    </a>
    <button class="navbar-toggle" aria-label="Menú">☰</button>
    <div class="navbar-nav">
      <a href="dashboard.html">Inicio</a>
      <a href="nuevo.html">Nuevo Presupuesto</a>
      <a href="historial.html" class="active">Historial</a>
      <span class="user-info">andoni</span>
      <span class="gs-status"></span>
      <a href="#" onclick="App.logout()">Salir</a>
    </div>
  </nav>

  <div class="container">
    <div class="action-bar no-print">
      <a href="nuevo.html" class="btn btn-success">+ Nuevo</a>
      <button class="btn btn-secondary" onclick="cargarHistorial()">Actualizar</button>
    </div>

    <div class="card">
      <h2>Historial de Presupuestos</h2>
      <div id="historialContent"><p class="sincronizando">Cargando presupuestos...</p></div>
    </div>
  </div>

  <script>var CONFIG = CONFIG || { googleSheetsWebAppUrl: null };</script>
  <script src="config.js" onerror="console.warn('config.js no encontrado, modo local')"></script>
  <script src="data/modelos.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function cargarHistorial() {
      const content = document.getElementById('historialContent');
      content.innerHTML = '<p class="sincronizando">Sincronizando...</p>';
      const presupuestos = await App.getAllPresupuestos();

      if (presupuestos.length === 0) {
        content.innerHTML = '<p class="vacia">No hay presupuestos generados todavía.</p>';
        return;
      }

      let html = `<table class="historial-table"><thead>
        <tr><th>Nº</th><th>Fecha</th><th>Cliente</th><th>Marca</th><th>Modelo</th><th></th></tr></thead><tbody>`;
      presupuestos.forEach(p => {
        html += `<tr>
          <td data-label="Nº">${p.numPresupuesto}</td>
          <td data-label="Fecha">${p.fecha}</td>
          <td data-label="Cliente">${p.cliente?.nombre || ''}</td>
          <td data-label="Marca">${p.marca?.nombre || ''}</td>
          <td data-label="Modelo">${p.modelo?.nombre || ''}</td>
          <td><a href="presupuesto.html?id=${p.id}" class="btn" style="padding:8px 20px;font-size:13px;">Ver</a></td>
        </tr>`;
      });
      html += '</tbody></table>';
      content.innerHTML = html;
    }

    cargarHistorial();
  </script>
</body>
</html>
