<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Calrenove - Acceso</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="logo-placeholder">
      <img src="img/logo-calrenove.png" alt="Calrenove" onerror="this.style.display='none'">
    </div>
    <h1>Calrenove</h1>
    <p class="subtitle">Presupuestos de calderas online</p>

    <div id="errorMsg" class="error" style="display:none;"></div>

    <form onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-block">Acceder</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:#aaa;">
      Calrenove &middot; Norcaldera &middot; Calderas Calefacción
    </p>
  </div>

  <script src="js/app.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;
      if (App.login(usuario, password)) return true;
      document.getElementById('errorMsg').textContent = 'Usuario o contraseña incorrectos';
      document.getElementById('errorMsg').style.display = 'block';
      return false;
    }
  </script>
</body>
</html>
